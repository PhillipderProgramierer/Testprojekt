name: Validate & Deploy KitaKosten

# GitHub Actions liest Workflows ausschließlich aus <repo-root>/.github/workflows/.
# Da das Projekt im Unterordner kitakosten/ liegt, arbeiten alle Schritte mit
# working-directory: kitakosten. Wird kitakosten/ als eigenes Repository
# ausgelagert, kann diese Datei nach kitakosten/.github/workflows/ verschoben
# und "kitakosten/" aus den Pfaden entfernt werden.

on:
  push:
    branches: ["main"]
    paths: ["kitakosten/**"]
  pull_request:
    paths: ["kitakosten/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-data:
    name: Daten validieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pipeline-Abhängigkeiten installieren
        working-directory: kitakosten/pipeline
        run: pip install jsonschema
      - name: Kommunen-JSONs validieren
        working-directory: kitakosten
        run: python -m pipeline validate

  build:
    name: Website bauen & deployen
    needs: validate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kitakosten/web/package-lock.json
      - name: Abhängigkeiten installieren
        working-directory: kitakosten/web
        run: npm ci
      - name: Unit-Tests
        working-directory: kitakosten/web
        run: npm test
      - name: Astro-Build
        working-directory: kitakosten/web
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      # Deploy nur, wenn ein Cloudflare-API-Token hinterlegt ist (Push auf main).
      - name: Deploy auf Cloudflare Pages
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy kitakosten/web/dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'kitakosten' }}
