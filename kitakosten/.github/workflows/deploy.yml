# HINWEIS: Diese Datei greift nur, wenn kitakosten/ das Wurzelverzeichnis des
# Git-Repositorys ist (GitHub Actions liest Workflows ausschließlich aus
# <repo-root>/.github/workflows/). Liegt kitakosten/ als Unterordner in einem
# größeren Repo, ist stattdessen <repo-root>/.github/workflows/deploy.yml aktiv.

name: Validate & Deploy KitaKosten

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-data:
    name: Daten validieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: python -m pipeline validate

  build:
    name: Website bauen & deployen
    needs: validate-data
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Astro-Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build
      - name: Deploy auf Cloudflare Pages
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'kitakosten' }}
          workingDirectory: web
